name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after a successful build
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

env:
  GOATCOUNTER_SITE_CODE: ky-ji
  VISITOR_ANALYTICS_START: "2026-07-10T00:00:00+09:00"

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.6"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run Ruby tests
        run: ruby -Itest -e 'Dir["test/*_test.rb"].sort.each { |file| require File.expand_path(file) }'

      - name: Run Node tests
        run: |
          node test/visitor_analytics_core_test.cjs
          node test/visitor_analytics_controller_test.cjs

      - name: Prepare visitor snapshot fixture
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          mkdir -p assets/data
          cp test/fixtures/visitor-stats.json assets/data/visitor-stats.json

      - name: Build visitor snapshot
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
        env:
          GOATCOUNTER_API_KEY: ${{ secrets.GOATCOUNTER_API_KEY }}
        run: |
          ruby scripts/build_visitor_stats.rb \
            --output assets/data/visitor-stats.json \
            --fallback-url https://ky-ji.github.io/assets/data/visitor-stats.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) && (github.event_name != 'workflow_dispatch' || inputs.deploy) }}
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('{0}-production', github.workflow) }}
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
