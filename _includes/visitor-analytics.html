<aside
  id="statsPanel"
  class="visitor-analytics"
  role="dialog"
  aria-labelledby="visitorAnalyticsTitle"
  aria-hidden="true"
  data-stats-url="{{ '/assets/data/visitor-stats.json' | relative_url }}"
  data-globe-script="{{ '/assets/vendor/globe.gl.min.js' | relative_url }}"
  data-centroids-url="{{ '/assets/data/country-centroids.json' | relative_url }}"
  data-texture-url="{{ '/assets/img/earth-night.jpg' | relative_url }}"
  data-dashboard-url="https://{{ site.goatcounter_code }}.goatcounter.com/"
  data-tracking-start="{{ site.visitor_analytics_start }}"
  data-query-key="k"
  data-query-value="1">
  <div class="visitor-analytics__header">
    <div class="visitor-analytics__heading">
      <p class="visitor-analytics__eyebrow">Private site summary</p>
      <h2 id="visitorAnalyticsTitle">Visitor Analytics</h2>
    </div>
    <button
      class="visitor-analytics__close"
      type="button"
      aria-label="Close visitor analytics">
      <i class="fa-solid fa-xmark" aria-hidden="true"></i>
    </button>
  </div>

  <div class="visitor-analytics__periods" role="group" aria-label="Analytics period">
    <button type="button" data-period="7d" aria-pressed="true">7 days</button>
    <button type="button" data-period="30d" aria-pressed="false">30 days</button>
    <button type="button" data-period="all" aria-pressed="false">All time</button>
  </div>

  <p class="visitor-analytics__status" data-status aria-live="polite">Loading analytics</p>

  <dl class="visitor-analytics__metrics" aria-label="Traffic summary">
    <div>
      <dt
        title="Unique visitors counted within GoatCounter's eight-hour session window"
        aria-label="Visitors, counted within GoatCounter's eight-hour session window">Visitors</dt>
      <dd data-metric="visitors">-</dd>
    </div>
    <div>
      <dt>Page Views</dt>
      <dd data-metric="pageviews">-</dd>
    </div>
    <div>
      <dt>Views / Visitor</dt>
      <dd data-metric="viewsPerVisitor">-</dd>
    </div>
    <div>
      <dt>Countries</dt>
      <dd data-metric="countryCount">-</dd>
    </div>
  </dl>

  <div class="visitor-analytics__body">
    <div class="visitor-analytics__globe-wrap">
      <div
        class="visitor-analytics__globe"
        data-globe
        role="img"
        aria-label="Visitor countries shown on a globe"></div>
      <p class="visitor-analytics__globe-fallback" data-globe-fallback hidden>
        Globe unavailable on this browser
      </p>
    </div>

    <div class="visitor-analytics__countries" aria-labelledby="topCountriesTitle">
      <h3 id="topCountriesTitle">Top Countries</h3>
      <ol data-country-list></ol>
    </div>
  </div>

  <div class="visitor-analytics__footer">
    <p>
      Since <time data-tracking-start></time>
      <span aria-hidden="true">&middot;</span>
      Updated <time data-updated-at></time>
    </p>
    <a
      href="https://{{ site.goatcounter_code }}.goatcounter.com/"
      target="_blank"
      rel="noopener noreferrer">
      <i class="fa-solid fa-chart-line" aria-hidden="true"></i>
      Open private dashboard
    </a>
  </div>
</aside>

<script src="{{ '/assets/js/visitor-analytics-core.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/visitor-analytics.js' | relative_url }}" defer></script>

{% if jekyll.environment == "production" and site.goatcounter_code %}
<script>
  (function () {
    if (window.location.hostname === "ky-ji.github.io") {
      var tracker = document.createElement("script");
      tracker.setAttribute(
        "data-goatcounter",
        "https://{{ site.goatcounter_code }}.goatcounter.com/count"
      );
      tracker.src = "https://gc.zgo.at/count.js";
      tracker.async = true;
      document.head.appendChild(tracker);
    }
  }());
</script>
{% endif %}
